<!--
  Supplementary head tags only.
  og:title / og:description / og:image / twitter:* are emitted by jekyll-seo-tag
  (driven by site.title, page.description, and the `image` default in _config.yml).
  Keep this file limited to what jekyll-seo-tag does NOT provide, to avoid duplicate tags.
-->

<!-- OG image dimensions (jekyll-seo-tag emits og:image but not width/height) -->
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Georgian Tech Resources — AI. In Georgian. Open-source." />

<!-- Theme color -->
<meta name="theme-color" content="#0D1B2A" />

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />
<link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}" />

<!-- Preconnect to Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
